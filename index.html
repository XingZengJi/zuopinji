<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #F5F0E8;
      color: #3D3B35;
      line-height: 1.6;
    }
    .header {
      padding: 60px 40px 40px;
      text-align: center;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 400;
      color: #2C2923;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }
    .header p {
      font-size: 14px;
      color: #8A8478;
    }
    .filters {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      padding: 0 20px;
    }
    .filter-btn {
      padding: 8px 20px;
      border: 1px solid #D4C9B8;
      background: transparent;
      color: #6B645A;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 2px;
    }
    .filter-btn:hover {
      background: #E8E2D6;
    }
    .filter-btn.active {
      background: #C4A77D;
      border-color: #C4A77D;
      color: #fff;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      padding: 0 40px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .card-cover {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      display: block;
      background: #E8E2D6;
    }
    .card-info {
      padding: 16px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: #2C2923;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 12px;
      color: #8A8478;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-category {
      display: inline-block;
      font-size: 11px;
      color: #C4A77D;
      margin-top: 10px;
      padding: 3px 8px;
      border: 1px solid #E0D5C3;
      border-radius: 2px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      max-width: 90%;
      max-height: 90%;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: -40px;
      right: 0;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px;
    }
    .modal-media {
      max-width: 100%;
      max-height: 80vh;
      display: block;
    }
    .modal-info {
      color: #fff;
      margin-top: 20px;
      text-align: center;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 8px;
    }
    .modal-desc {
      font-size: 14px;
      color: #aaa;
    }
    @media (max-width: 1024px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        padding: 0 24px 40px;
      }
    }
    @media (max-width: 640px) {
      .gallery {
        grid-template-columns: 1fr;
        padding: 0 16px 32px;
      }
      .header {
        padding: 40px 20px 24px;
      }
      .header h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>作品集</h1>
    <p>记录每一个创意瞬间</p>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-category="all">全部</button>
  </div>

  <div class="gallery" id="gallery">
    <!-- Cards will be inserted here -->
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div id="modal-media-container"></div>
      <div class="modal-info">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-desc" id="modal-desc"></div>
      </div>
    </div>
  </div>

  <script>
    let videosData = [];
    let worksData = [];

    // Fetch video URLs
    fetch('/api/videos.json')
      .then(res => res.json())
      .then(data => {
        videosData = data;
        loadWorks();
      })
      .catch(() => {
        loadWorks();
      });

    function loadWorks() {
      fetch('/api/works.json')
        .then(res => res.json())
        .then(data => {
          worksData = data;
          renderFilters(data);
          renderGallery(data);
        });
    }

    function renderFilters(data) {
      const categories = ['全部', ...new Set(data.map(item => item.category).filter(Boolean))];
      const filtersEl = document.getElementById('filters');
      filtersEl.innerHTML = categories.map((cat, idx) =>
        `<button class="filter-btn ${idx === 0 ? 'active' : ''}" data-category="${cat === '全部' ? 'all' : cat}">${cat}</button>`
      ).join('');

      filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const cat = btn.dataset.category;
          const filtered = cat === 'all' ? data : data.filter(item => item.category === cat);
          renderGallery(filtered);
        });
      });
    }

    function renderGallery(data) {
      const galleryEl = document.getElementById('gallery');
      galleryEl.innerHTML = data.map((item, idx) => {
        const coverSrc = item.coverUrl || '';

        return `
          <div class="card" onclick="openModal(${idx}, ${JSON.stringify(item).replace(/"/g, '&quot;')})">
            <img class="card-cover" src="${coverSrc}" alt="${item.title}" onerror="this.style.background='#E8E2D6'">
            <div class="card-info">
              <div class="card-title">${item.title}</div>
              <div class="card-desc">${item.description || ''}</div>
              ${item.category ? `<span class="card-category">${item.category}</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function openModal(idx, item) {
      const modal = document.getElementById('modal');
      const container = document.getElementById('modal-media-container');
      const titleEl = document.getElementById('modal-title');
      const descEl = document.getElementById('modal-desc');

      const isVideo = item.type === 'video';

      if (isVideo) {
        container.innerHTML = `<video class="modal-media" controls autoplay><source src="${item.coverUrl || ''}" type="video/mp4">您的浏览器不支持视频播放</video>`;
      } else {
        container.innerHTML = `<img class="modal-media" src="${item.coverUrl || ''}" alt="${item.title}">`;
      }

      titleEl.textContent = item.title;
      descEl.textContent = item.description || '';
      modal.classList.add('active');
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('active');
      document.getElementById('modal-media-container').innerHTML = '';
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
